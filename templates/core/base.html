<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus{% endblock %} — Social Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #111114;
            --surface2: #18181d;
            --surface3: #1e1e25;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.15);
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --text-muted: #55556a;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --accent3: #43e97b;
            --gold: #f5c842;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px rgba(0,0,0,0.4);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }
        img { display: block; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }
        input, textarea { font-family: inherit; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

        .app-layout { display: grid; grid-template-columns: 260px 1fr 300px; min-height: 100vh; max-width: 1400px; margin: 0 auto; }

        /* Sidebar */
        .sidebar { position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 28px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
        .logo { display: flex; align-items: center; gap: 10px; padding: 8px 12px; margin-bottom: 24px; }
        .logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 18px; color: white; font-weight: 700; flex-shrink: 0; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm); color: var(--text-dim); transition: var(--transition); font-weight: 500; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: var(--surface3); color: var(--text); }
        .nav-item .badge { margin-left: auto; background: var(--accent); color: white; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; min-width: 20px; text-align: center; }
        .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 16px 16px 8px; }
        .sidebar-user { margin-top: auto; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 16px; border-radius: var(--radius-sm); transition: var(--transition); }
        .sidebar-user:hover { background: var(--surface2); }
        .avatar { border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .avatar-sm { width: 36px; height: 36px; }
        .avatar-md { width: 48px; height: 48px; }
        .avatar-lg { width: 80px; height: 80px; }
        .avatar-xl { width: 120px; height: 120px; border: 4px solid var(--bg); }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-handle { color: var(--text-muted); font-size: 12px; font-family: 'DM Mono', monospace; }

        /* Main */
        .main-content { border-right: 1px solid var(--border); }
        .page-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,10,11,0.9); backdrop-filter: blur(20px); z-index: 10; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; }
        .page-subtitle { color: var(--text-dim); font-size: 13px; margin-top: 2px; }

        /* Right panel */
        .right-panel { padding: 28px 20px; display: flex; flex-direction: column; gap: 24px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .panel-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; margin-bottom: 16px; }

        /* Post card */
        .post-card { padding: 24px 28px; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .post-card:hover { background: rgba(255,255,255,0.01); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .post-meta { flex: 1; }
        .post-author { font-weight: 600; font-size: 14px; }
        .post-author:hover { color: var(--accent); }
        .post-time { color: var(--text-muted); font-size: 12px; font-family: 'DM Mono', monospace; }
        .post-content { font-size: 15px; line-height: 1.7; margin-bottom: 14px; }
        .post-image { width: 100%; border-radius: var(--radius-sm); margin-bottom: 14px; aspect-ratio: 16/9; object-fit: cover; }
        .post-actions { display: flex; gap: 4px; align-items: center; }
        .action-btn { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: var(--transition); }
        .action-btn:hover { background: var(--surface2); color: var(--text); }
        .action-btn.liked { color: var(--accent2); }
        .action-btn svg { width: 16px; height: 16px; }
        .post-category { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
        .ai-badge { display: inline-flex; align-items: center; gap: 5px; background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(255,101,132,0.1)); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; margin-left: 6px; }
        .rec-reason { font-size: 12px; color: var(--text-muted); font-style: italic; margin-bottom: 10px; padding: 6px 10px; background: var(--surface2); border-radius: 8px; border-left: 2px solid var(--accent); }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; padding: 2px 8px; border-radius: 6px; font-family: 'DM Mono', monospace; }

        /* Compose */
        .compose-area { padding: 24px 28px; border-bottom: 1px solid var(--border); }
        .compose-box { display: flex; gap: 12px; }
        .compose-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text); font-size: 15px; resize: none; min-height: 80px; transition: var(--transition); outline: none; width: 100%; }
        .compose-input:focus { border-color: var(--accent); background: var(--surface3); }
        .compose-input::placeholder { color: var(--text-muted); }
        .compose-meta { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
        .compose-actions { display: flex; align-items: center; gap: 10px; }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13px; transition: var(--transition); letter-spacing: 0.02em; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; border: none; }
        .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--border-hover); background: var(--surface3); }
        .btn-sm { padding: 7px 14px; font-size: 12px; }
        .btn-ghost { color: var(--text-dim); background: none; border: none; }
        .btn-ghost:hover { color: var(--text); background: var(--surface2); }
        .btn-danger { background: rgba(255,101,132,0.15); color: var(--accent2); border: 1px solid rgba(255,101,132,0.3); }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 28px; }
        .tab { padding: 16px 0; margin-right: 28px; font-weight: 600; font-size: 14px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: var(--transition); cursor: pointer; }
        .tab.active { color: var(--text); border-bottom-color: var(--accent); }

        /* Forms */
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
        .form-input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: var(--transition); width: 100%; }
        .form-input:focus { border-color: var(--accent); background: var(--surface3); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; width: 100%; cursor: pointer; }

        /* Alerts */
        .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; }
        .alert-error { background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.3); color: #ff6584; }
        .alert-success { background: rgba(67,233,123,0.1); border: 1px solid rgba(67,233,123,0.3); color: #43e97b; }

        /* Suggested users */
        .suggested-user { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
        .suggested-user-info { flex: 1; min-width: 0; }
        .suggested-user-name { font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .suggested-user-handle { color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; }

        /* Trending */
        .trending-tag { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .trending-tag:last-child { border: none; }
        .tag-name { font-weight: 600; font-size: 13px; color: var(--accent); }
        .tag-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

        /* Comments */
        .comments-section { padding: 0 28px 20px; display: none; }
        .comment-item { display: flex; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); }
        .comment-body { flex: 1; }
        .comment-author { font-weight: 600; font-size: 13px; }
        .comment-text { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
        .comment-time { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 3px; }
        .comment-input-row { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
        .comment-input:focus { border-color: var(--accent); }

        /* Profile */
        .profile-cover { width: 100%; height: 200px; object-fit: cover; }
        .profile-cover-wrapper { position: relative; overflow: hidden; }
        .profile-avatar-wrapper { position: absolute; bottom: -54px; left: 28px; }
        .profile-info { padding: 64px 28px 24px; }
        .profile-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; }
        .profile-bio { color: var(--text-dim); margin-top: 8px; font-size: 14px; max-width: 500px; }
        .profile-stats { display: flex; gap: 28px; margin-top: 16px; }
        .stat-item .stat-num { font-weight: 700; font-size: 20px; font-family: 'Playfair Display', serif; }
        .stat-item .stat-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }

        /* Notifications */
        .notif-item { display: flex; gap: 12px; padding: 14px 28px; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .notif-item.unread { background: rgba(108,99,255,0.05); border-left: 2px solid var(--accent); }
        .notif-content { flex: 1; }
        .notif-text { font-size: 13px; }
        .notif-time { color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 4px; }

        /* Auth */
        .auth-page { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
        .auth-visual { background: #080810; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .auth-visual-content { text-align: center; z-index: 1; padding: 40px; position: relative; }
        .auth-visual h1 { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; line-height: 1.15; background: linear-gradient(135deg, #fff 0%, #b8b0ff 50%, #ff9eb5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-visual p { color: rgba(255,255,255,0.45); margin-top: 20px; font-size: 15px; line-height: 1.9; max-width: 320px; margin-left: auto; margin-right: auto; }
        .auth-visual-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 25% 40%, rgba(108,99,255,0.35) 0%, transparent 55%), radial-gradient(ellipse at 75% 60%, rgba(255,101,132,0.25) 0%, transparent 55%); }
        .grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .auth-form-panel { display: flex; align-items: center; justify-content: center; padding: 40px; background: var(--bg); }
        .auth-form { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 20px; }
        .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .auth-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; }
        .auth-subtitle { color: var(--text-dim); font-size: 14px; }
        .auth-link { color: var(--accent); font-weight: 600; }
        .auth-link:hover { text-decoration: underline; }
        .auth-divider { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 12px; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow); min-width: 200px; transition: all 0.3s; }

        /* Score bar */
        .score-bar { height: 3px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .score-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; }

        /* Misc */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text-dim); margin-bottom: 8px; }
        .search-bar { display: flex; gap: 12px; align-items: center; padding: 20px 28px; }
        .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 18px; color: var(--text); font-size: 15px; outline: none; transition: var(--transition); }
        .search-input:focus { border-color: var(--accent); }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); gap: 10px; }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ai-glow { box-shadow: 0 0 20px rgba(108,99,255,0.2); }
        .divider { height: 1px; background: var(--border); margin: 4px 0; }

        @media (max-width: 1200px) { .app-layout { grid-template-columns: 240px 1fr; } .right-panel { display: none; } }
        @media (max-width: 768px) { .app-layout { grid-template-columns: 1fr; } .sidebar { display: none; } .auth-page { grid-template-columns: 1fr; } .auth-visual { display: none; } }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}

<div class="toast-container" id="toastContainer"></div>

<script>
function getCookie(name) {
    let v = null;
    if (document.cookie) {
        for (let c of document.cookie.split(';')) {
            c = c.trim();
            if (c.startsWith(name + '=')) { v = decodeURIComponent(c.slice(name.length + 1)); break; }
        }
    }
    return v;
}
const CSRF = getCookie('csrftoken');

function showToast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderColor = type === 'error' ? 'rgba(255,101,132,0.5)' : type === 'success' ? 'rgba(67,233,123,0.4)' : 'var(--border)';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(10px)'; setTimeout(() => t.remove(), 300); }, 3000);
}

function likePost(postId, btn) {
    fetch(`/post/${postId}/like/`, { method: 'POST', headers: { 'X-CSRFToken': CSRF } })
    .then(r => r.json()).then(data => {
        btn.classList.toggle('liked', data.liked);
        const count = btn.querySelector('.like-count');
        if (count) count.textContent = data.count;
    });
}

function toggleComments(postId) {
    const s = document.getElementById(`comments-${postId}`);
    if (s) s.style.display = s.style.display === 'block' ? 'none' : 'block';
}

function submitComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const content = input.value.trim();
    if (!content) return;
    fetch(`/post/${postId}/comment/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `content=${encodeURIComponent(content)}`
    }).then(r => r.json()).then(data => {
        if (data.error) return showToast(data.error, 'error');
        input.value = '';
        const list = document.getElementById(`comment-list-${postId}`);
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `<img src="${data.avatar}" class="avatar avatar-sm" alt=""><div class="comment-body"><a href="/profile/${data.author}/" class="comment-author">${data.author}</a><p class="comment-text">${data.content}</p><span class="comment-time">${data.created_at}</span></div>`;
        list.appendChild(div);
        const cnt = document.querySelector(`[data-comment-count="${postId}"]`);
        if (cnt) cnt.textContent = data.count;
        showToast('Comment added', 'success');
    });
}

function followUser(username, btn) {
    fetch(`/profile/${username}/follow/`, { method: 'POST', headers: { 'X-CSRFToken': CSRF } })
    .then(r => r.json()).then(data => {
        if (data.error) return showToast(data.error, 'error');
        btn.textContent = data.following ? 'Following' : 'Follow';
        btn.className = data.following ? 'btn btn-secondary btn-sm' : 'btn btn-primary btn-sm';
    });
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
